# BacSeq2 configuration template
# Copy to config/config.yaml with: bin/bacseq init
# Then set input_dir and output_dir before running.

# Input/output
input_dir: "fastq"
output_dir: "results"
mode: "short"         # short, long, or hybrid
threads: 8
memory_gb: 32

# Database profile
# minimal  = testing only
# standard = routine bacterial WGS
# full     = publication-level annotation with AMR/MGE/virulence/prophage modules
# Paths below are automatically updated by setup scripts.
database_dir: "~/bacseq_db"
database_profile: "standard"

# Core database paths
run_mash_precheck: false        # automatically true only if a real Mash sketch is supplied
mash_db: ""
gtdbtk_data: "~/bacseq_db/gtdbtk/gtdbtk_data"
kraken2_db: "~/bacseq_db/kraken2/standard"
kraken2_pluspf_db: "~/bacseq_db/kraken2/pluspf"
taxdump_dir: "~/bacseq_db/taxdump"
busco_db_path: "auto"
eggnog_db: "~/bacseq_db/eggnog"
cazyme_db: "~/bacseq_db/dbcan"
phastest_db: "~/bacseq_db/phastest"

# AMR, virulence, plasmid, MGE, and prophage database paths
amrfinder_db: "~/bacseq_db/amrfinderplus"
card_rgi_db: "~/bacseq_db/card_rgi"
resfinder_db: "~/bacseq_db/resfinder_db"
pointfinder_db: "~/bacseq_db/pointfinder_db"
vfdb_nt: "~/bacseq_db/vfdb/VFDB_setB_nt.fas"
vfdb_prot: "~/bacseq_db/vfdb/VFDB_setB_pro.fas"
vfdb_diamond_db: "~/bacseq_db/vfdb/VFDB_setB_pro.dmnd"
mob_suite_db: "~/bacseq_db/mob_suite"
plasmidfinder_db: "~/bacseq_db/plasmidfinder_db"
mefinder_db: "~/bacseq_db/mobileelementfinder"
phigaro_db: "~/bacseq_db/phigaro"
genomad_db: "~/bacseq_db/genomad"

# Core module switches
run_species: true
run_decontam_screen: true
run_auto_decontam: false       # recommended default: false; review first
run_annotation: true
run_mlst: true

# AMR comparison layer
run_amr: true
run_amrfinderplus: true
run_card_rgi: true
run_resfinder: true
run_amr_consensus: true

# Virulence, plasmids, MGE, and phage
run_virulence: true
run_vfdb: true
run_plasmid: true
run_mob_suite: true
run_plasmidfinder: true
run_mge: true
run_mobileelementfinder: true
run_integronfinder: true
run_isescan: true
run_prophage: true
run_phigaro: true
run_genomad: false

# Optional functional/comparative modules
run_cazyme: false
run_comparative: false

# Decontamination policy
# review_only: generate candidate contaminants and plots but do not remove contigs
# strict: remove only high-confidence contaminants and keep quarantine FASTA
contamination_policy: "review_only"
minimum_contig_length: 500
minimum_contaminant_confidence: 0.90

# AMR/MGE thresholds
amr_min_identity: 90
amr_min_coverage: 60
vfdb_min_identity: 80
vfdb_min_coverage: 60
mge_min_identity: 80
mge_min_coverage: 60
